name: Release

on:
    push:
        branches:
            - master

permissions:
    contents: write

jobs:
    build:
        runs-on: windows-latest
        outputs:
            version: ${{ steps.version.outputs.version }}
        
        steps:
            - uses: actions/checkout@v4
              with:
                  submodules: recursive
                  fetch-depth: 0

            - name: Download Dalamud
              shell: pwsh
              run: |
                  Invoke-WebRequest 'https://goatcorp.github.io/dalamud-distrib/stg/latest.zip' -OutFile dalamud.zip
                  Expand-Archive dalamud.zip -DestinationPath dalamud_dist
                  "DALAMUD_HOME=$env:GITHUB_WORKSPACE\dalamud_dist" | Out-File -Append $env:GITHUB_ENV

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: '10.x'

            - name: Build
              run: dotnet build Aetherfit/Aetherfit.csproj -c Release

            - name: Read version
              id: version
              shell: pwsh
              run: |
                  $manifest = Get-Content "Aetherfit\bin\Release\win-x64\Aetherfit.json" | ConvertFrom-Json
                  "version=$($manifest.AssemblyVersion)" | Out-File -Append $env:GITHUB_OUTPUT

            - name: Package
              shell: pwsh
              run: Compress-Archive -Path "Aetherfit\bin\Release\win-x64\*" -DestinationPath latest.zip

            - name: Create release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: v${{ steps.version.outputs.version }}
                  files: latest.zip
                  generate_release_notes: true
                  overwrite_files: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Update repo.json
              shell: pwsh
              run: |
                  $manifest = Get-Content "Aetherfit\bin\Release\win-x64\Aetherfit.json" -Raw | ConvertFrom-Json
                  $loaded = Get-Content "repo.json" -Raw | ConvertFrom-Json
                  $repo = @($loaded)
                  $entry = $repo[0]
                  $existingNames = @($entry.PSObject.Properties.Name)
                  foreach ($prop in $manifest.PSObject.Properties) {
                      if ($existingNames -contains $prop.Name) {
                          $entry.$($prop.Name) = $prop.Value
                      }
                  }
                  $entry.LastUpdate = [int64]([DateTimeOffset]::UtcNow.ToUnixTimeSeconds())
                  $json = (ConvertTo-Json -InputObject $repo -Depth 10 -AsArray) -replace '(?m)^(\s+)', '$1$1'
                  Set-Content -Path "repo.json" -Value $json -Encoding utf8NoBOM

            - name: Commit repo.json
              shell: pwsh
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git diff --quiet HEAD -- repo.json
                  if ($LASTEXITCODE -eq 0) {
                      Write-Host "repo.json unchanged; nothing to commit."
                      exit 0
                  }
                  $LASTEXITCODE = 0
                  git add repo.json
                  git commit -m "chore(release): update repo.json for v${{ steps.version.outputs.version }} [skip ci]"
                  git push origin HEAD:master
