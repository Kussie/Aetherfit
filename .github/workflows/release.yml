name: Release

on:
    push:
        tags:
            - 'v*'

permissions:
    contents: write

jobs:
    build:
        runs-on: windows-latest
        outputs:
            version: ${{ steps.version.outputs.version }}
        
        steps:
            - uses: actions/checkout@v4
              with:
                  submodules: recursive
                  fetch-depth: 0

            - name: Download Dalamud
              shell: pwsh
              run: |
                  Invoke-WebRequest 'https://goatcorp.github.io/dalamud-distrib/stg/latest.zip' -OutFile dalamud.zip
                  Expand-Archive dalamud.zip -DestinationPath dalamud_dist
                  "DALAMUD_HOME=$env:GITHUB_WORKSPACE\dalamud_dist" | Out-File -Append $env:GITHUB_ENV

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: '10.x'

            - name: Build
              run: dotnet build Aetherfit/Aetherfit.csproj -c Release

            - name: Read version
              id: version
              shell: pwsh
              run: |
                  $manifest = Get-Content "Aetherfit\bin\Release\win-x64\Aetherfit.json" | ConvertFrom-Json
                  "version=$($manifest.AssemblyVersion)" | Out-File -Append $env:GITHUB_OUTPUT

            - name: Package
              shell: pwsh
              run: Compress-Archive -Path "Aetherfit\bin\Release\win-x64\*" -DestinationPath latest.zip

            - name: Create release
              uses: softprops/action-gh-release@v2
              with:
                  files: latest.zip
                  generate_release_notes: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
