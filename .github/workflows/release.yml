name: Release

on:
    push:
        branches:
            - master
            - testing

permissions:
    contents: write

jobs:
    build:
        runs-on: windows-latest
        outputs:
            version: ${{ steps.version.outputs.version }}

        steps:
            - uses: actions/checkout@v7
              with:
                  submodules: recursive
                  fetch-depth: 0

            - name: Set build variables
              id: vars
              shell: pwsh
              run: |
                  if ($env:GITHUB_REF -eq 'refs/heads/testing') {
                      "zip_name=latest-testing.zip" | Out-File -Append $env:GITHUB_OUTPUT
                      "is_testing=true" | Out-File -Append $env:GITHUB_OUTPUT
                  } else {
                      "zip_name=latest-stable.zip" | Out-File -Append $env:GITHUB_OUTPUT
                      "is_testing=false" | Out-File -Append $env:GITHUB_OUTPUT
                  }

            - name: Download Dalamud
              shell: pwsh
              # Release track, not staging: releases must build against the API users actually run.
              run: |
                  Invoke-WebRequest 'https://goatcorp.github.io/dalamud-distrib/latest.zip' -OutFile dalamud.zip
                  Expand-Archive dalamud.zip -DestinationPath dalamud_dist
                  "DALAMUD_HOME=$env:GITHUB_WORKSPACE\dalamud_dist" | Out-File -Append $env:GITHUB_ENV

            - name: Setup .NET
              uses: actions/setup-dotnet@v6
              with:
                  dotnet-version: '10.x'

            - name: Build
              run: dotnet build Aetherfit/Aetherfit.csproj -c Release

            - name: Read version
              id: version
              shell: pwsh
              run: |
                  $manifest = Get-Content "Aetherfit\bin\Release\win-x64\Aetherfit.json" | ConvertFrom-Json
                  "version=$($manifest.AssemblyVersion)" | Out-File -Append $env:GITHUB_OUTPUT

            - name: Package
              shell: pwsh
              run: Compress-Archive -Path "Aetherfit\bin\Release\win-x64\*" -DestinationPath "${{ steps.vars.outputs.zip_name }}"

            - name: Create stable release
              if: steps.vars.outputs.is_testing == 'false'
              uses: softprops/action-gh-release@v3
              with:
                  tag_name: v${{ steps.version.outputs.version }}
                  files: ${{ steps.vars.outputs.zip_name }}
                  generate_release_notes: true
                  overwrite_files: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Create testing pre-release
              if: steps.vars.outputs.is_testing == 'true'
              uses: softprops/action-gh-release@v3
              with:
                  tag_name: testing
                  name: v${{ steps.version.outputs.version }}-Testing Build
                  files: ${{ steps.vars.outputs.zip_name }}
                  generate_release_notes: true
                  overwrite_files: true
                  prerelease: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Update repo.json (stable)
              if: steps.vars.outputs.is_testing == 'false'
              shell: pwsh
              run: |
                  $manifest = Get-Content "Aetherfit\bin\Release\win-x64\Aetherfit.json" -Raw | ConvertFrom-Json
                  $entry = Get-Content "repo.json" -Raw | ConvertFrom-Json
                  while ($entry -is [Array]) { $entry = $entry[0] }
                  $existingNames = @($entry.PSObject.Properties.Name)
                  foreach ($prop in $manifest.PSObject.Properties) {
                      if ($existingNames -contains $prop.Name) {
                          $entry.$($prop.Name) = $prop.Value
                      }
                  }
                  $entry.LastUpdate = [int64]([DateTimeOffset]::UtcNow.ToUnixTimeSeconds())
                  $json = (ConvertTo-Json -InputObject $entry -Depth 10 -AsArray) -replace '(?m)^(\s+)', '$1$1'
                  Set-Content -Path "repo.json" -Value $json -Encoding utf8NoBOM

            - name: Update repo.json (testing)
              if: steps.vars.outputs.is_testing == 'true'
              shell: pwsh
              run: |
                  git fetch origin master
                  git checkout -B master origin/master
                  $entry = Get-Content "repo.json" -Raw | ConvertFrom-Json
                  while ($entry -is [Array]) { $entry = $entry[0] }
                  $entry.TestingAssemblyVersion = "${{ steps.version.outputs.version }}"
                  $json = (ConvertTo-Json -InputObject $entry -Depth 10 -AsArray) -replace '(?m)^(\s+)', '$1$1'
                  Set-Content -Path "repo.json" -Value $json -Encoding utf8NoBOM

            - name: Update download count
              shell: pwsh
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  $headers = @{ Authorization = "Bearer $env:GITHUB_TOKEN"; 'User-Agent' = 'Aetherfit-release-workflow' }
                  $releases = Invoke-RestMethod -Uri "https://api.github.com/repos/Kussie/Aetherfit/releases?per_page=100" -Headers $headers
                  $downloadCount = ($releases | ForEach-Object { $_.assets } | Measure-Object -Property download_count -Sum).Sum
                  $entry = Get-Content "repo.json" -Raw | ConvertFrom-Json
                  while ($entry -is [Array]) { $entry = $entry[0] }
                  $entry.DownloadCount = [int64]$downloadCount
                  $json = (ConvertTo-Json -InputObject $entry -Depth 10 -AsArray) -replace '(?m)^(\s+)', '$1$1'
                  Set-Content -Path "repo.json" -Value $json -Encoding utf8NoBOM

            - name: Commit repo.json
              shell: pwsh
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git diff --quiet HEAD -- repo.json
                  if ($LASTEXITCODE -eq 0) {
                      Write-Host "repo.json unchanged; nothing to commit."
                      exit 0
                  }
                  $LASTEXITCODE = 0
                  git add repo.json
                  git commit -m "chore(release): update repo.json for v${{ steps.version.outputs.version }} [skip ci]"
                  git push origin HEAD:master
